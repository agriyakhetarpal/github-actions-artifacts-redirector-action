name: Build test artifact

on:
  pull_request:
    branches: ["*"]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Inject the commit SHA into the static test HTML file and write to
      # a separate output directory so the source file stays clean.
      # In a real project this step would be `sphinx-build -b singlehtml ...`
      - name: Create test artifact
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          mkdir -p dist_artifacts
          envsubst '$COMMIT_SHA' < test_artifacts/preview.html > dist_artifacts/preview.html

      # upload-artifact@v7 with archive: false — single file, browser-viewable
      - name: Upload test artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist_artifacts/preview.html
          archive: false
          retention-days: 14
          # artifact name will be "preview" (filename without extension)
